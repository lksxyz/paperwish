<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>Tembak Tembak Dor Dor Dor</title>
    <link rel="stylesheet" href="./src/style.css" />
  </head>
  <body>
    <main class="layout">
      <main class="stage" aria-label="Game stage">
        <video
          id="webcam"
          class="stage__video"
          autoplay
          playsinline
          muted
        ></video>
        <canvas id="gameCanvas" class="stage__canvas"></canvas>
        <div id="gameOver" class="game-over" hidden>
          <div class="game-over__panel">
            <span class="game-over__eyebrow">Run ended</span>
            <h2 class="game-over__title">Defeated</h2>
            <p class="game-over__subtitle">The enemy broke through.</p>
            <div class="game-over__score">
              <span>Final score</span>
              <strong id="finalScore">0</strong>
            </div>
            <button id="restartBtn" class="btn btn--primary" type="button">
              Play again
            </button>
          </div>
        </div>
      </main>

      <aside class="panel panel--right">
        <header class="panel__head">
          <span class="brand__mark" aria-hidden="true"></span>
          <span class="panel__title">Tembak Tembak Dor Dor Dor</span>
        </header>

        <div class="panel__section">
          <div class="stat">
            <span class="stat__label">Score</span>
            <span id="gameScore" class="stat__value">0</span>
          </div>
          <div class="stat">
            <span class="stat__label">Lives</span>
            <span id="gameLives" class="stat__lives">
              <span class="life"></span>
              <span class="life"></span>
              <span class="life"></span>
              <span class="life"></span>
              <span class="life"></span>
              <span class="life"></span>
              <span class="life"></span>
              <span class="life"></span>
              <span class="life"></span>
              <span class="life"></span>
            </span>
          </div>
          <div class="stat">
            <span class="stat__label">Wave</span>
            <span id="gameDifficulty" class="stat__value">1</span>
          </div>
        </div>

        <div class="panel__section">
          <div class="panel__row">
            <span id="stateBadge" class="state-badge state-badge--idle">IDLE</span>
            <div class="lift" aria-label="Index trigger">
              <div class="lift__bar">
                <div id="liftFill" class="lift__fill"></div>
              </div>
              <span id="liftValue" class="lift__value">0.000</span>
            </div>
          </div>
          <ul class="fingers" aria-label="Finger states">
            <li class="finger" id="fingerThumb">
              <span class="finger__icon">⊙</span>
              <span class="finger__name">T</span>
            </li>
            <li class="finger" id="fingerIndex">
              <span class="finger__icon">⊙</span>
              <span class="finger__name">I</span>
            </li>
            <li class="finger" id="fingerMiddle">
              <span class="finger__icon">⊙</span>
              <span class="finger__name">M</span>
            </li>
            <li class="finger" id="fingerRing">
              <span class="finger__icon">⊙</span>
              <span class="finger__name">R</span>
            </li>
            <li class="finger" id="fingerPinky">
              <span class="finger__icon">⊙</span>
              <span class="finger__name">P</span>
            </li>
          </ul>
        </div>

        <div class="panel__section panel__pills">
          <span id="status" class="pill pill--idle">Idle</span>
          <span id="latency" class="pill pill--dim">—</span>
          <span id="fps" class="pill pill--dim" title="Frames per second">0 fps</span>
        </div>

        <div class="panel__section panel__controls">
          <button id="startWebcam" class="btn btn--primary" type="button">
            Start
          </button>
          <button id="stopWebcam" class="btn" type="button" disabled>
            Stop
          </button>
          <label class="toggle">
            <input id="soundToggle" type="checkbox" checked />
            <span>SFX</span>
          </label>
        </div>
      </aside>
    </main>

    <script type="module" src="./src/index.js"></script>
  </body>
</html>
